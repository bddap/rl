[package]
name = "rl"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.17"
bevy_rapier3d = "0.32"
rand = "0.8"
serde = { version = "1", features = ["derive"] }

# burn added later when we wire up the NN (M1)
# burn = { version = "0.20", features = ["autodiff", "ndarray", "wgpu"] }

# Enable optimizations in dev for physics sim performance
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
