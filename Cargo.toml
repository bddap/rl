[package]
name = "rl"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.17"
bevy_rapier3d = "0.32"
rand = "0.8"
serde = { version = "1", features = ["derive"] }

burn = { version = "0.20", features = ["autodiff", "ndarray"] }
rand_distr = "0.5"
clap = { version = "4", features = ["derive"] }
bincode = "1"

[features]
# Train on the GPU (cubecl-cuda, Nvidia). Off by default: CPU (ndarray) is
# faster for small models and needs no GPU/toolkit; enable for bigger models
# where the matmuls become compute-bound. Requires the CUDA deps in shell.nix.
cuda = ["burn/cuda"]

# Enable optimizations in dev for physics sim performance
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
