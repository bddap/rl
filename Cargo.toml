[package]
name = "rl"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.18"
bevy_rapier3d = "0.34"
# Immediate-mode GUI for the TEMPORARY in-demo `--debug-sliders` physics panel
# (src/debug_sliders.rs). 0.39 is the bevy_egui release series that tracks bevy
# 0.18. The panel plugin is only added behind the flag, so training/headless never
# instantiate it — zero runtime cost; the crate is compiled into the one binary
# regardless of mode.
bevy_egui = "0.39"
rand = "0.8"
serde = { version = "1", features = ["derive"] }

burn = { version = "0.20", features = ["autodiff", "ndarray"] }
rand_distr = "0.5"
clap = { version = "4", features = ["derive"] }
bincode = "1"

[dev-dependencies]
# Mesh-fit spike (src/bot/meshfit.rs): read the skinned glTF's skeleton + skin
# weights to auto-derive colliders. `utils` enables the accessor readers;
# `names` keeps node names (the bone↔part mapping keys on them). No `import`
# (it would drag in `image`); we feed the GLB bytes to `Gltf::from_slice`.
# Already in the tree via bevy at this version, so this adds no new crate.
gltf = { version = "1.4.1", default-features = false, features = ["utils", "names"] }

# Enable optimizations in dev for physics sim performance
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[patch.crates-io]
rapier3d = { git = "https://github.com/bddap-bot/rapier", rev = "3ccc03d91ec0cff7ddd370c8e9a34240991f9875" }
