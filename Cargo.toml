[package]
name = "rl"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.18"
bevy_rapier3d = "0.34"
rand = "0.8"
serde = { version = "1", features = ["derive"] }

burn = { version = "0.20", features = ["autodiff", "ndarray"] }
rand_distr = "0.5"
clap = { version = "4", features = ["derive"] }
bincode = "1"

# Enable optimizations in dev for physics sim performance
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[patch.crates-io]
rapier3d = { git = "https://github.com/bddap-bot/rapier", rev = "89383d33f5f0b6459d559bc345de440ad2fff467" }
