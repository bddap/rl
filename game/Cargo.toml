[package]
name = "game"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "game"
path = "src/main.rs"

[dependencies]
# render ON: the `play` / `fp-screenshot` modes are the windowed first-person client
# (net::render). The headless modes (net/solo/nn-crab-probe) live in the same binary.
# net drives the multiplayer sim; crab-world supplies the crab-asset digest the arm
# handshake folds in (net depends on crab-world, but game names it directly because it
# calls `crab_world::bot::meshfit::crab_asset_digest` itself).
net = { path = "../net", features = ["render"] }
crab-world = { path = "../crab-world", features = ["render"] }
anyhow.workspace = true
clap.workspace = true
iroh.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
