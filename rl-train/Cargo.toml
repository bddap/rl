[package]
name = "rl-train"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "rl-train"
path = "src/main.rs"

[features]
# DEFAULT-ON: the PPO update runs ONLY on the GPU (rl#49; ~1.5–4.3× the CPU update on
# the RTX 2080), so the trainer links burn-wgpu on a bare `cargo build` — no opt-in flag.
# `wgpu` forwards to crab-world's GPU backend WITHOUT pulling `render`, so the headless
# trainer gets burn-wgpu (wgpu 26) but still NO bevy_render/wgpu 27. Building it OFF
# (`--no-default-features`) leaves the learn path with no update backend, which is a hard
# compile error (see crab-world/src/training/inproc.rs), never a silent CPU fallback.
default = ["wgpu"]
wgpu = ["crab-world/wgpu"]

[dependencies]
# render OFF (crab-world's default) — the headless trainer links NO bevy_render/wgpu27.
crab-world = { path = "../crab-world" }
# bevy for the `Vec3`/math types the DEV verify modes use; burn for the bench-update
# backend; clap for arg parsing. No bevy_rapier3d here — the verify/bench entries don't
# touch it directly (crab-world does, transitively).
bevy.workspace = true
clap.workspace = true
burn.workspace = true
# A tracing subscriber so the trainer's `info!`/`warn!`/`error!` actually surface: the
# headless build links no bevy LogPlugin, so without an installed subscriber every log —
# including the non-finite-observation guard — is silently discarded.
tracing.workspace = true
# `env-filter` owned explicitly (RUST_LOG support) rather than borrowed from bevy_log's
# feature unification, so dropping bevy from this crate can't silently break `init_tracing`.
tracing-subscriber = { workspace = true, features = ["env-filter"] }
